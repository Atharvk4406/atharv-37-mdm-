<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=<device-width>, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            background:#f4f4f4;
            font-family:Arial, Helvetica, sans-serif;
            padding:20px;
        }
        .container{
            background:white;
            margin:auto;
            border-radius:10px ;
            padding:20px;
            max-width:320px;
            text-align:center;




        }
        select{
            padding:15px;
           border-radius:6px;
           border:1 px;
            width:100%;
            font-size:16px;


        }
        #monuments{
            padding:15px;
            margin-top:20px;
            background:skyblue;
            color:#eef3ff;
        }
    </style>
</head>
<body>
    <div class="container">
        <h3>Monuments Of famous cities</h3>
        <select  id="t1" onchange="showmonuments()">
            <option value="">Select acity</option>
            <option value="Delhi">Delhi</option>
            <option value="Mumbai">Mumbai</option>
            <option value="Jaipur">Jaipur</option>
            <option value="Sindhudurg">Sindhudurg</option>
        </select>
    <div id="monuments">
        <h3>Select to view famous monuments of cities</h3>

    </div>
    </div>
    <script>
        
        function showmonuments()
        {
           const city=document.getElementById("t1").value;
        const monuments=document.getElementById("monuments")
         if(city=="Delhi")
        {
            monuments.innerHTML="Red Fort,Charminar";
        }
        else if(city=="Mumbai")
        {
            monuments.innerHTML="Gateway of India,Taj Hotel,Siddhivinayak Temple,CSMT";
        }else if(city=="Jaipur")
        {
            monuments.innerHTML="Hawai Mahal,Temples";
        }
        else if(city=="Sindhudurg")
        {
            monuments.innerHTML=" Sindhudurg Fort,Maharaj Statue";
        }
        else
        {
            monuments.innerHTML="Select a city";
        }

        }
        
    </script>
</body>
</html>
